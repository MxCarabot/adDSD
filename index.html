<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q3 SW2 Ver2

  </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ===== GLOBAL ===== */
    body {
      font-family: "Gill Sans MT", sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
        url('https://i.pinimg.com/originals/90/70/32/9070324cdfc07c68d60eed0c39e77573.gif');
      background-size: cover;
      background-position: center;
      color: white;
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      background: linear-gradient(to right, #061f45, #0a60d1);
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }

    .navbar h1 {
      color: white;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
      font-size: 26px;
    }

    .navbar-nav .nav-link {
      font-size: 20px;
      color: white;
    }

    /* ===== MAIN CARD ===== */
    #brands {
      max-width: 900px;
      width: 100%;
      background: rgba(0, 215, 252, 0.25);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0, 215, 252, 0.4);
    }

    /* ===== INPUT ===== */
    #budget {
      text-align: center;
      font-size: 22px;
      color: #072f70;
      border-radius: 30px;
      padding: 12px;
    }

    /* ===== BUTTONS ===== */
    #buttons {
      background: linear-gradient(to right, #00c6ff, #0072ff);
      border: none;
      border-radius: 30px;
      width: 100%;
      max-width: 300px;
      font-size: 18px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    #buttons:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00c6ff;
    }

    /* ===== BRAND BUTTONS ===== */
    #brand_btn {
      background: transparent;
      border: 2px solid #00c6ff;
      color: white;
      border-radius: 20px;
      padding: 8px;
      width: 200px;
      margin-bottom: 8px;
      transition: 0.3s;
    }

    #brand_btn:hover {
      background-color: #00c6ff;
      color: black;
    }

    /* ===== IMAGES ===== */
    img {
      max-width: 100%;
      height: auto;
    }

    #villman, #silicon {
      max-width: 300px;
      height: auto;
    }

    #laptop {
      width: 50px;
      height: 50px;
    }

    /* ===== TEXT HIGHLIGHTS ===== */
    b {
      background-color: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 8px;
    }

    /* ===== PRICE TAG ===== */
    #pricetag {
      display: inline-block;
      background-color: antiquewhite;
      color: #161f36;
      border-radius: 15px;
      border: 3px solid gray;
      font-size: 22px;
      padding: 10px 15px;
      margin-top: 10px;
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 60px;
      padding: 10px 0;
      color: #ccc;
      font-size: 14px;
      text-align: center;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .navbar h1 {
        font-size: 22px;
      }

      #buttons {
        max-width: 100%;
      }

      #brand_btn {
        width: 100%;
      }

      #pricetag {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md">
  <div class="container-fluid align-items-center">

    <!-- LEFT LINKS -->
    <ul class="navbar-nav flex-row gap-3">
      <li class="nav-item">
        <a class="nav-link" href="#">Shop</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Locate</a>
      </li>
    </ul>

    <!-- CENTER TITLE -->
    <h1 class="mx-auto text-center">Product Locator</h1>

    <!-- RIGHT SEARCH -->
    <form class="d-flex mt-2 mt-md-0">
      <input class="form-control me-2" type="text" placeholder="Search">
      <button class="btn btn-primary" type="button">Search</button>
    </form>

  </div>
</nav>

<br>

<!-- BUDGET CARD -->
<div class="container d-flex justify-content-center">
  <div id="brands" class="w-100">
    <form>
      <h3 class="text-center">
        Want a gaming laptop?
        <img id="laptop" src="https://i.gifer.com/embedded/download/YCZM.gif"><br>
        Enter your budget and let's find the right one for you!
      </h3>

      <input type="text" class="form-control mt-3" id="budget" placeholder="Enter here...">

    </form>
  </div>
</div>

<br>

<!-- BUTTON SECTIONS -->
<div class="container">
  <div class="row text-center">

    <!-- BRAND SECTION -->
    <div class="col-md-6 mb-4">
      <button id="buttons" class="btn" onclick="showBrand()">Brand & Discounts</button>
      <div id="brand"></div>
    </div>

    <!-- STORE SECTION -->
    <div class="col-md-6 mb-4">
      <button id="buttons" class="btn" onclick="showStore()">Store Location</button>
      <div id="stores"></div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer text-center mt-5">
  <hr class="text-white">
  &copy; <label class="text-white">Student Name</label>
</div>

<!-- JAVASCRIPT (unchanged) -->
<script>
  function showBrand(){
    let budget = Number(document.getElementById('budget').value);
    if (!budget || budget <= 0) {
      alert("Please enter a valid budget.");
      return;
    }
    let finalPrice = (budget * 0.20).toFixed(2);

    document.getElementById("brand").innerHTML =
      "<br> <b style='color: white;'> Recommended Brands:<br>" +
      "<button id='brand_btn' class='btn'>Acer</button><br>" +
      "<button id='brand_btn' class='btn'>Asus</button><br>" +
      "<button id='brand_btn' class='btn'>Lenovo</button><br>" +
      "<br><br> <span id='pricetag'>  You are eligible for:  <kbd>" + finalPrice + "</kbd> </span>" +
      "</b>";
  }

  function showStore(){
    document.getElementById("stores").innerHTML =
      "<br><img id='villman' src='https://villman.com/images/villman_logo_2020.png' class='img-thumbnail'><br>" +
      "<br><b style='color: white;'>Location: <br></b>" +
      "<i>Cyberzone, SM City Fairview Main Building <br> Quirino Highway, Corner Regalado Hwy</i><br><br>" +
      "<img id='silicon' src='https://cdn.bitrefill.com/content/cn/b_rgb%3AFFFFFF%2Cc_pad%2Ch_720%2Cw_1280/v1647289011/silicon-valley-philippines.webp' class='img-thumbnail'><br>" +
      "<br><b style='color: white;'>Location: <br></b>" +
      "<i>SM City North EDSA Annex 1 Tunnel, Bago Bantay, <br> Quezon City, Metro Manila</i>";
  }
</script>

</body>
</html>
